# .github/workflows/docker-ci.yml
name: Docker CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    services:
      docker:
        image: docker:27.0.2
        options: --privileged
        volumes:
          - /var/lib/docker
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Docker Compose
        run: |
          curl -L "https://github.com/docker/compose/releases/download/v2.29.2/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
          chmod +x /usr/local/bin/docker-compose

      - name: Create .env file for CI
        run: |
          cat <<EOF > .env
          APP_ENV=testing
          APP_DEBUG=true
          APP_URL=http://localhost

          DB_HOST=db
          DB_PORT=3306
          DB_DATABASE=laravel_test
          DB_USERNAME=root
          DB_PASSWORD=secret

          REDIS_HOST=redis
          REDIS_PASSWORD=null
          REDIS_PORT=6379

          MAIL_MAILER=smtp
          MAIL_HOST=mailhog
          MAIL_PORT=1025
          MAIL_USERNAME=null
          MAIL_PASSWORD=null
          MAIL_ENCRYPTION=null
          EOF

      - name: Build Docker images
        run: docker compose build

      - name: Start services
        run: docker compose up -d

      - name: Wait for MySQL to be ready
        run: |
          for i in {1..30}; do
            docker compose exec db mysqladmin ping -h db -u root -psecret && break
            echo "Waiting for MySQL... attempt $i"
            sleep 2
          done

      - name: Run PHP unit tests
        run: docker compose run --rm app php artisan test --env=testing

      - name: Run lint
        run: docker compose run --rm app php artisan lint

      - name: Teardown
        if: always()
        run: docker compose down -v