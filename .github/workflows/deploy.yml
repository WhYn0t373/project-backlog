name: Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'docker-compose.yml'
      - 'prometheus/**'
      - 'grafana/**'
      - 'alertmanager/**'
      - 'loki/**'
      - 'Dockerfile'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push app image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/app:latest

      - name: Deploy Docker stack
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          DOCKER_HOST: ${{ secrets.DOCKER_HOST }}
        run: |
          echo "$SSH_PRIVATE_KEY" > /tmp/id_rsa
          chmod 600 /tmp/id_rsa
          scp -o StrictHostKeyChecking=no -i /tmp/id_rsa docker-compose.yml $DOCKER_HOST:/home/ubuntu/docker-compose.yml
          ssh -o StrictHostKeyChecking=no -i /tmp/id_rsa $DOCKER_HOST "dockeranlage stack deploy -c /home/ubuntu/docker-compose.yml mystack"