name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.3
        env:
          MYSQL_ROOT_PASSWORD: secret
          MYSQL_DATABASE: laravel
          MYSQL_USER: root
          MYSQL_PASSWORD: secret
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -psecret"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pdo_mysql, mbstring, exif, gd, zip
          coverage: pcov

      - name: Install Composer dependencies
        run: |
          composer install --prefer-dist --no-progress --no-suggest --optimize-autoloader

      - name: Copy .env for testing
        run: |
          cp .env.example .env
          echo "DB_HOST=mysql" >> .env
          echo "DB_DATABASE=laravel" >> .env
          echo "DB_USERNAME=root" >> .env
          echo "DB_PASSWORD=secret" >> .env
          echo "JWT_SECRET=demo_secret_32_bytes_string_demo_secret_32" >> .env
          echo "JWT_TTL=60" >> .env

      - name: Run migrations
        run: |
          php artisan migrate --env=testing --no-interaction

      - name: Run PHPUnit tests
        run: |
          vendor/bin/phpunit --coverage-clover=coverage.xml

      - name: Upload PHPUnit coverage
        uses: actions/upload-artifact@v4
        with:
          name: phpunit-coverage
          path: coverage.xml