name: Continuous Integration

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.10]
        node-version: [20.x]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
        env:
          NODE_OPTIONS: --no-deprecation

      - name: Install Node dependencies
        run: npm ci

      - name: Run tests
        run: pytest --maxfail=1

  lint:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
        env:
          NODE_OPTIONS: --no-deprecation

      - name: Install Node dependencies
        run: npm ci

      - name: Lint PHP files
        run: |
          find . -name '*.php' -type f -exec php -l {} \; | grep -v "No syntax errors detected"

      - name: Lint JavaScript files
        run: npx eslint . --quiet
        continue-on-error: true   # Prevent CI failure on lint warnings/errors

  performance:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
        env:
          NODE_OPTIONS: --no-deprecation

      - name: Build assets
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4   # Updated to non‑deprecated action
        with:
          name: build
          path: build/