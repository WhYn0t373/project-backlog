name: Laravel CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: laravel
          MYSQL_USER: root
          MYSQL_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo_mysql, mbstring, dom, zip
          ini-values: upload_max_filesize=50M,post_max_size=50M, max_file_uploads=20
          coverage: none

      - name: Install Composer dependencies
        run: composer install --prefer-d

      - name: Copy .env
        run: cp .env.example .env

      - name: Generate app key
        run: php artisan key:generate --no-interaction

      - name: Run migrations
        run: php artisan migrate --no-interaction

      - name: Run queue worker in background
        run: |
          php artisan queue:work --daemon &
          QUEUE_WORKER_PID=$!
          echo "Queue worker started with PID $QUEUE_WORKER_PID"

      - name: Run tests
        run: php artisan test --stop-on-failure

      - name: Stop queue worker
        run: |
          kill $QUEUE_WORKER_PID
          wait $QUEUE_WORKER_PID 2>/dev/null || true