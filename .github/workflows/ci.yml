name: CI

on:
  push:
    branches: [ main, master, staging ]
  pull_request:
    branches: [ main, master, staging ]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:5.7
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: app
          MYSQL_USER: app
          MYSQL_PASSWORD: app
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring,pdo_mysql,zip
          coverage: none

      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: npm

      - name: Cache composer dependencies
        uses: actions/cache@v3
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Cache npm dependencies
        uses: actions/cache@v3
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress --no-suggest --no-interaction

      - name: Install NPM dependencies
        run: npm ci

      - name: PHP Lint
        run: find . -type f -name "*.php" -not -path "./vendor/*" -print0 | xargs -0 -n1 php -l

      - name: Run PHP unit tests
        run: php artisan test --parallel --coverage-text --stop-on-failure

      - name: Run integration tests
        run: php artisan test --testsuite=Integration

      - name: Build Docker image
        run: |
          IMAGE_TAG=${{ secrets.DOCKER_REGISTRY }}/${{ github.repository_owner }}/${{ github.repository }}:${{ github.sha }}
          docker build -t $IMAGE_TAG .

      - name: Docker login
        uses: docker/login-action@v2
        with:
          registry: ${{ secrets.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker image
        run: |
          IMAGE_TAG=${{ secrets.DOCKER_REGISTRY }}/${{ github.repository_owner }}/${{ github.repository }}:${{ github.sha }}
          docker push $IMAGE_TAG

      - name: Start services
        env:
          IMAGE_TAG: ${{ secrets.DOCKER_REGISTRY }}/${{ github.repository_owner }}/${{ github.repository }}:${{ github.sha }}
        run: |
          docker compose -f docker-compose.yml up -d
          # Wait for MySQL to be ready
          until docker exec mysql mysqladmin ping -h "localhost" -u"app" -p"app" &>/dev/null; do sleep 1; done
          # Run migrations
          docker exec app php artisan migrate --force

      - name: Run E2E tests
        uses: cypress-io/github-action@v6
        with:
          start: npm run dev
          wait-on: http://localhost:8000
          wait-on-timeout: 60

      - name: Deploy to staging
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd ${{ secrets.STAGING_DEPLOY_PATH }}
            IMAGE_TAG=${{ secrets.DOCKER_REGISTRY }}/${{ github.repository_owner }}/${{ github.repository }}:${{ github.sha }}
            bash deploy-staging.sh "$IMAGE_TAG"